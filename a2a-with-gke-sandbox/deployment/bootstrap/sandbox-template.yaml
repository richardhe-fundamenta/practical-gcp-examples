# NOTE: apiVersion is v1alpha1 — this cluster's controller uses v1alpha1.
# The upstream example repo uses v1beta1; do NOT use that here.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python-sandbox-template
  namespace: default
spec:
  podTemplate:
    spec:
      # Untrusted code runs here — don't mount the namespace default ServiceAccount token.
      automountServiceAccountToken: false
      containers:
      - name: python-runtime
        # Our analytics runtime, built + pushed to Artifact Registry by bootstrap.sh from
        # deployment/sandbox-runtime/ (private nodes pull from AR via Private Google Access).
        image: ${SANDBOX_IMAGE}
        ports:
        - containerPort: 8888
        readinessProbe:
          httpGet:
            path: "/"
            port: 8888
          initialDelaySeconds: 0
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: "/"
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
            ephemeral-storage: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      restartPolicy: "OnFailure"
